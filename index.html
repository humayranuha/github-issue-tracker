<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind CSS + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">
    <!-- ===== SIGN IN PAGE ===== -->
    <section id="sign-in" class="min-h-screen flex items-center justify-center p-4">
        <div class="card w-full max-w-sm bg-base-100 shadow-xl">
            <div class="card-body items-center p-6 sm:p-8">
                <!-- Logo -->
                <div class="w-10 h-10 rounded-full flex items-center justify-center mb-4">
                    <img src="./assets/github-logo.png" alt="logo" class="w-8 h-8 sm:w-10 sm:h-10">
                </div>

                <h2 class="text-xl sm:text-2xl font-bold text-center">Github Issues Tracker</h2>
                <p class="text-gray-500 text-xs sm:text-sm mb-6 text-center">Sign in to manage your issues</p>

                <!-- Form -->
                <div class="w-full space-y-4">
                    <div class="form-control w-full">
                        <label class="label"><span
                                class="label-text font-bold text-left text-sm sm:text-base">Username</span></label>
                        <input id="name-input" type="text" placeholder="Enter your username"
                            class="input input-bordered w-full" />
                    </div>
                    <div class="form-control w-full">
                        <label class="label"><span
                                class="label-text font-bold text-left text-sm sm:text-base">Password</span></label>
                        <input id="pass-input" type="password" placeholder="Enter your password"
                            class="input input-bordered w-full" />
                    </div>

                    <button onclick="loadHomePage()" class="btn btn-primary w-full">Sign In</button>

                    <div class="divider text-gray-400 text-xs sm:text-sm">
                        OR
                    </div>

                    <!-- Demo Credentials -->
                    <div class="bg-gray-50 rounded-lg p-3 sm:p-4 text-left border border-gray-200">
                        <p class="text-center font-semibold text-xs sm:text-sm mb-2">Demo Credentials</p>
                        <div class="space-y-1 text-xs sm:text-sm">
                            <p><span class="font-medium">Username:</span> admin</p>
                            <p><span class="font-medium">Password:</span> admin123</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== MAIN PAGE ===== -->
    <section id="main-page" class="hidden">
        <!-- Navbar -->
        <div class="navbar bg-base-100 shadow-md px-3 sm:px-4 md:px-8 py-2">
            <div class="flex-1">
                <div class="flex items-center gap-1 sm:gap-2">
                    <img src="./assets/github-logo.png" alt="logo" class="w-6 h-6 sm:w-8 sm:h-8">
                    <span class="font-bold text-base sm:text-xl xs:inline">Github Issues Tracker</span>
                </div>
            </div>
            <div class="flex items-center justify-end gap-1 sm:gap-2">
                <div class="form-control">
                    <input id="search-input" type="text" placeholder="Search"
                        class="input input-bordered w-28 sm:w-48 md:w-64 text-sm" />
                </div>
                <button onclick="searchIssues()" class="btn btn-primary btn-sm md:btn-md">
                    <i class="fas fa-search text-xs sm:text-sm"></i>
                </button>
                <button class="btn btn-primary btn-sm md:btn-md">
                    <i class="fa-solid fa-plus text-xs sm:text-sm"></i>
                    <span class="hidden sm:inline"> New issue</span>
                </button>
            </div>
        </div>

        <!-- Main Container -->
        <div class="container mx-auto px-3 sm:px-4 py-4 sm:py-8 max-w-7xl">
            <!-- Tabs -->
            <div class="tabs tabs-lifted mb-4 sm:mb-6 overflow-x-auto">
                <button id="all-tab-btn" onclick="switchTab('all')"
                    class="tab tab-active text-sm sm:text-base whitespace-nowrap">All</button>
                <button id="open-tab-btn" onclick="switchTab('open')"
                    class="tab text-sm sm:text-base whitespace-nowrap">Open</button>
                <button id="closed-tab-btn" onclick="switchTab('closed')"
                    class="tab text-sm sm:text-base whitespace-nowrap">Closed</button>
            </div>

            <!-- Stats -->
            <div
                class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 sm:gap-4 mb-4 sm:mb-6">
                <div class="flex items-center gap-2 sm:gap-3">
                    <img id="all-status" src="./assets/Aperture.png" alt="" class="w-6 h-6 sm:w-8 sm:h-8">
                    <img id="open-status" src="./assets/Open-Status.png" alt="" class="w-6 h-6 sm:w-8 sm:h-8 hidden">
                    <img id="closed-status" src="./assets/Closed- Status .png" alt="" class="w-6 h-6 sm:w-8 sm:h-8 hidden">

                    <div>
                        <h2 id="issue-count" class="text-xl sm:text-2xl font-bold">0 Issues</h2>
                        <p class="text-gray-500 text-xs sm:text-sm">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-2 sm:gap-3">
                    <div class="flex items-center gap-1 sm:gap-2">
                        <div class="w-2 h-2 sm:w-3 sm:h-3 rounded-full bg-green-500"></div>
                        <span class="text-xs sm:text-sm font-medium">Open</span>
                    </div>
                    <div class="flex items-center gap-1 sm:gap-2">
                        <div class="w-2 h-2 sm:w-3 sm:h-3 rounded-full bg-purple-500"></div>
                        <span class="text-xs sm:text-sm font-medium">Closed</span>
                    </div>
                </div>
            </div>

            <!-- Issues -->
            <div id="issues-container"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 sm:gap-5">
                <!-- Issues will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Modal -->
    <dialog id="issue-modal" class="modal">
        <div class="modal-box max-w-2xl w-11/12 sm:w-full">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <div id="modal-content"></div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script src="./script.js"></script>
</body>

</html>
